<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #0d0a1f; font-family: sans-serif; padding: 2rem; color: #fff; }
  h1 { margin-bottom: 2rem; font-size: 1.2rem; opacity: .6; }
  .row { display: flex; gap: 1rem; margin-bottom: 2.5rem; }
  .label { font-size: .8rem; opacity: .5; margin-bottom: .6rem; letter-spacing: .1em; text-transform: uppercase; }
  .card { width: 180px; height: 120px; border-left: 4px solid; display: flex; align-items: flex-end; padding: .7rem; font-size: .75rem; font-weight: 700; }
  /* A - Aurora */
  .a1 { background: linear-gradient(160deg, #041a2e, #0a1520); border-color: #00c8cc; }
  .a2 { background: linear-gradient(160deg, #120a2e, #0d0520); border-color: #8844ff; }
  .a3 { background: linear-gradient(160deg, #1f0a1a, #120510); border-color: #cc2288; }
  /* B - Ember */
  .b1 { background: linear-gradient(160deg, #1a1200, #0f0a00); border-color: #c8a020; }
  .b2 { background: linear-gradient(160deg, #1a0800, #120400); border-color: #c85010; }
  .b3 { background: linear-gradient(160deg, #140000, #0d0000); border-color: #a02010; }
  /* C - Deep Ocean */
  .c1 { background: linear-gradient(160deg, #020c1e, #040e28); border-color: #0088ff; }
  .c2 { background: linear-gradient(160deg, #021510, #041a14); border-color: #00bb88; }
  .c3 { background: linear-gradient(160deg, #0a0520, #060318); border-color: #7755cc; }
  /* D - Cosmic */
  .d1 { background: linear-gradient(160deg, #0c0c18, #080814); border-color: #4455aa; }
  .d2 { background: linear-gradient(160deg, #080f0c, #050d09); border-color: #226644; }
  .d3 { background: linear-gradient(160deg, #100810, #0a050d); border-color: #664488; }
</style>
</head>
<body>
<h1>Project Card Colour Options</h1>
<div class="label">A — Aurora</div>
<div class="row">
  <div class="card a1">Java Engine</div>
  <div class="card a2">Heal I/O</div>
  <div class="card a3">AlgoLearn</div>
</div>
<div class="label">B — Ember</div>
<div class="row">
  <div class="card b1">Java Engine</div>
  <div class="card b2">Heal I/O</div>
  <div class="card b3">AlgoLearn</div>
</div>
<div class="label">C — Deep Ocean</div>
<div class="row">
  <div class="card c1">Java Engine</div>
  <div class="card c2">Heal I/O</div>
  <div class="card c3">AlgoLearn</div>
</div>
<div class="label">D — Cosmic</div>
<div class="row">
  <div class="card d1">Java Engine</div>
  <div class="card d2">Heal I/O</div>
  <div class="card d3">AlgoLearn</div>
</div>
</body>
</html>
